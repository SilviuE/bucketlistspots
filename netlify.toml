[build]
  functions = "netlify/functions"
  command = "npm install && npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Stripe webhook: separate function, NOT under /api/* to avoid blanket IP rate limiter.
# Stripe must be able to deliver webhooks without customer-facing throttling.
[[redirects]]
  from = "/webhooks/stripe"
  to = "/.netlify/functions/webhook-stripe"
  status = 200

[[redirects]]
  from = "/guides"
  to = "/for-guides"
  status = 301

[[redirects]]
  from = "/ambassador"
  to = "/ambassadors"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "index, follow"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
